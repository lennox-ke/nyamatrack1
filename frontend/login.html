<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#dc2626">
<title>NyamaTrack — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon"><i class="fas fa-drumstick-bite"></i></div>
      <h1>NyamaTrack</h1>
      <p>Smart Inventory for Butcher Shops</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);">
      <p style="font-size:13px;color:var(--text-secondary);">
        No account? <a href="#" onclick="showRegister()" style="color:var(--primary);font-weight:600;">Register here</a>
      </p>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal-overlay" id="registerModal">
  <div class="modal" style="max-width:480px;">
    <h3>Create Account</h3>
    <p>Join NyamaTrack today</p>
    <form id="registerForm">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div class="form-group" style="margin:0;">
          <label class="form-label">First Name *</label>
          <input type="text" class="form-input" id="regFirstName" required>
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">Last Name *</label>
          <input type="text" class="form-input" id="regLastName" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username *</label>
        <input type="text" class="form-input" id="regUsername" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="regEmail" required>
      </div>
      <div class="form-group">
        <label class="form-label">Shop Name</label>
        <input type="text" class="form-input" id="regShopName" placeholder="Your butcher shop name">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Role *</label>
          <select class="form-input" id="regRole">
            <option value="owner">Shop Owner</option>
            <option value="keeper">Stock Keeper</option>
            <option value="butcher">Butcher</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Password *</label>
          <input type="password" class="form-input" id="regPassword" required minlength="6" autocomplete="new-password">
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary" id="registerBtn" style="flex:1;">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
        <button type="button" class="btn btn-secondary" onclick="hideRegister()" style="flex:1;">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>
<script>
// Redirect if already logged in
if (Auth.isAuthenticated()) window.location.href = 'dashboard.html';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  Loading.show(btn, 'Signing in…');

  try {
    const res = await fetch(`${CONFIG.API_URL}/token/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      const data = await res.json();
      Auth.setTokens(data.access, data.refresh);
      localStorage.setItem('username', username);
      Toast.success('Login successful!');
      window.location.href = 'dashboard.html';
    } else {
      const err = await res.json();
      Toast.error(err.detail || 'Invalid credentials');
      Loading.hide(btn);
    }
  } catch {
    Toast.error('Connection error. Is the server running?');
    Loading.hide(btn);
  }
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const userData = {
    username:   document.getElementById('regUsername').value,
    email:      document.getElementById('regEmail').value,
    first_name: document.getElementById('regFirstName').value,
    last_name:  document.getElementById('regLastName').value,
    password:   document.getElementById('regPassword').value,
    profile: {
      role:      document.getElementById('regRole').value,
      shop_name: document.getElementById('regShopName').value
    }
  };
  const btn = document.getElementById('registerBtn');
  Loading.show(btn, 'Creating…');

  try {
    const res = await fetch(`${CONFIG.API_URL}/users/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(userData)
    });
    if (res.ok) {
      Toast.success('Account created! Please log in.');
      hideRegister();
      document.getElementById('username').value = userData.username;
    } else {
      const err = await res.json();
      let msg = 'Registration failed';
      if (err.username) msg = 'Username already exists';
      else if (err.email) msg = 'Email already registered';
      else if (err.password) msg = 'Password too weak (min 6 chars)';
      Toast.error(msg);
    }
  } catch { Toast.error('Connection error'); }
  Loading.hide(btn);
});

function showRegister() { document.getElementById('registerModal').classList.add('open'); }
function hideRegister()  { document.getElementById('registerModal').classList.remove('open'); }
</script>
</body>
</html>
