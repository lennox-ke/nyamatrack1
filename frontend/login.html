<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#dc2626">
    <meta name="description" content="NyamaTrack - Smart Inventory Management for Butcher Shops">

    <title>NyamaTrack - Login</title>

    <!--
        PERFORMANCE STRATEGY
        ─────────────────────
        1. Font Awesome loads non-blocking (media trick) — icons appear ~200ms after paint
        2. Background image uses a tiny inline base64 blur placeholder so the
           page looks complete instantly, real photo fades in when loaded
        3. No external CSS file dependency for this page — all styles inline,
           zero render-blocking requests
        4. Token checked synchronously before any render work begins
        5. Fetch uses AbortController timeout to fail fast on slow networks
        6. Role + user info cached to localStorage on login so every other page
           can skip their own /users/ fetch on load
    -->

    <!-- Font Awesome — non-blocking, icons appear after first paint -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>

    <style>
        /* ─── Reset ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ─── Body / background ─── */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Instant solid colour while photo loads */
            background-color: #7f1d1d;
            overflow-x: hidden;
        }

        /* Full-screen background photo — loads after paint */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            /* Low-quality inline placeholder: dark red blur, ~300 bytes */
            background-color: #7f1d1d;
            background-size: cover;
            background-position: center;
            /* Overlay */
            filter: none;
        }
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(127,29,29,0.88) 0%,
                rgba(153,27,27,0.82) 50%,
                rgba(220,38,38,0.75) 100%
            );
        }
        /* Fade in when the real image is ready */
        .bg.loaded {
            animation: bgFade 0.6s ease-out both;
        }
        @keyframes bgFade {
            from { opacity: 0.6; }
            to   { opacity: 1; }
        }

        /* ─── Login card ─── */
        .card {
            position: relative;
            z-index: 1;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.55);
            animation: slideUp 0.4s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Brand ─── */
        .brand { text-align: center; margin-bottom: 28px; }
        .brand-icon {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 32px; color: #fff;
            box-shadow: 0 8px 24px rgba(220,38,38,0.35);
        }
        .brand h1 { font-size: 26px; color: #111827; margin-bottom: 4px; font-weight: 800; }
        .brand p  { color: #6b7280; font-size: 14px; }

        /* ─── Form elements ─── */
        .form-group  { margin-bottom: 18px; }
        .form-label  { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-input  {
            width: 100%; padding: 13px 16px;
            border: 2px solid #e5e7eb; border-radius: 12px;
            font-size: 16px; background: #f9fafb;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            /* Prevent iOS zoom on focus (font-size ≥ 16px already handles it) */
        }
        .form-input:focus {
            outline: none; border-color: #dc2626; background: #fff;
            box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
        }

        /* ─── Buttons ─── */
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(220,38,38,0.3);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }

        /* Loading spinner inside button */
        .spinner {
            display: none; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.35);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 0.7s linear infinite;
        }
        .btn.loading .spinner  { display: inline-block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Divider ─── */
        .divider {
            text-align: center; margin-top: 22px; padding-top: 22px;
            border-top: 1px solid #e5e7eb;
            color: #6b7280; font-size: 14px;
        }
        .divider a { color: #dc2626; text-decoration: none; font-weight: 600; }
        .divider a:hover { text-decoration: underline; }

        /* ─── Toast ─── */
        #toastContainer { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 14px 20px; background: #fff; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; font-weight: 500;
            border-left: 4px solid;
            animation: toastIn 0.25s ease-out both;
            max-width: 300px;
        }
        .toast.success { border-color: #10b981; }
        .toast.error   { border-color: #ef4444; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(16px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ─── Register modal ─── */
        .modal-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
            z-index: 1000; align-items: flex-start; justify-content: center;
            padding: 20px; overflow-y: auto;
        }
        .modal-backdrop.open { display: flex; }
        .modal-card {
            background: #fff; padding: 36px 32px; border-radius: 20px;
            width: 100%; max-width: 440px; margin: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: slideUp 0.3s cubic-bezier(.22,1,.36,1) both;
            position: relative; z-index: 1;
        }
        .modal-card .brand h2 { font-size: 22px; color: #111827; font-weight: 800; }
        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ─── Mobile ─── */
        @media (max-width: 480px) {
            .card         { padding: 28px 18px; }
            .modal-card   { padding: 28px 18px; }
            .brand h1     { font-size: 22px; }
            .name-row     { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Background: solid colour shows instantly, photo fades in -->
    <div class="bg" id="bgEl"></div>

    <!-- Login card -->
    <div class="card">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-drumstick-bite"></i></div>
            <h1>NyamaTrack</h1>
            <p>Smart Inventory Management</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-input" id="username"
                       placeholder="Enter your username"
                       required autocomplete="username"
                       autocapitalize="none" spellcheck="false">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-input" id="password"
                       placeholder="Enter your password"
                       required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
            </button>
        </form>

        <div class="divider">
            Don't have an account?
            <a href="#" id="registerLink">Register</a>
        </div>
    </div>

    <!-- Register modal -->
    <div class="modal-backdrop" id="registerModal" role="dialog" aria-modal="true" aria-label="Create account">
        <div class="modal-card">
            <div class="brand" style="margin-bottom:22px;">
                <h2>Create Account</h2>
                <p>Join NyamaTrack today</p>
            </div>
            <form id="registerForm" novalidate>
                <div class="name-row">
                    <div class="form-group">
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-input" id="regFirstName" required autocomplete="given-name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name *</label>
                        <input type="text" class="form-input" id="regLastName" required autocomplete="family-name">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Username *</label>
                    <input type="text" class="form-input" id="regUsername" required autocapitalize="none" spellcheck="false">
                </div>
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-input" id="regEmail" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label">Shop Name</label>
                    <input type="text" class="form-input" id="regShopName" placeholder="Your butcher shop name">
                </div>
                <div class="form-group">
                    <label class="form-label">Role *</label>
                    <select class="form-input" id="regRole">
                        <option value="owner">Shop Owner</option>
                        <option value="keeper">Stock Keeper</option>
                        <option value="butcher">Butcher</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" class="form-input" id="regPassword" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <span class="spinner"></span>
                    <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
                </button>
                <button type="button" class="btn" id="cancelBtn"
                        style="margin-top:10px; background:#f3f4f6; color:#374151;">
                    Cancel
                </button>
            </form>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script>
    (() => {
        'use strict';

        // ── 1. Instant token check — redirect before any render work ──
        if (localStorage.getItem('access_token')) {
            window.location.replace('dashboard.html');
            // Stop execution — browser will navigate away
        }

        const API_URL = window.CONFIG?.API_URL || 'http://localhost:8000/api';

        // ── 2. Load background photo after first paint ──
        // The solid colour is already showing; we lazy-load the real photo
        const IMG_URL = 'https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=1400&q=75&auto=format&fit=crop';
        const bgEl = document.getElementById('bgEl');
        const img  = new Image();
        img.onload = () => {
            bgEl.style.backgroundImage = `url('${IMG_URL}')`;
            bgEl.classList.add('loaded');
        };
        img.src = IMG_URL;

        // ── 3. Focus username immediately ──
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        usernameInput.focus();

        // ── 4. Shared fetch helper with timeout ──
        async function apiFetch(url, options = {}, timeoutMs = 10000) {
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
            try {
                const res = await fetch(url, { ...options, signal: ctrl.signal });
                clearTimeout(tid);
                return res;
            } catch (err) {
                clearTimeout(tid);
                throw err;
            }
        }

        // ── 5. Toast ──
        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"
                               style="color:${type === 'success' ? '#10b981' : '#ef4444'};font-size:16px;"></i>
                            <span>${msg}</span>`;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translateX(16px)';
                el.style.transition = 'all 0.25s';
                setTimeout(() => el.remove(), 260);
            }, 3000);
        }

        // ── 6. Login ──
        const loginBtn = document.getElementById('loginBtn');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            if (!username || !password) { toast('Please enter username and password', 'error'); return; }

            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                const res = await apiFetch(`${API_URL}/token/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();

                    // Cache tokens + username
                    localStorage.setItem('access_token',  data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('username', username);

                    // Fetch & cache role NOW so every other page skips its own /users/ call
                    // Fire-and-forget — don't block the redirect
                    fetchAndCacheRole(data.access, username).finally(() => {
                        window.location.replace('dashboard.html');
                    });

                    toast('Login successful!', 'success');
                } else {
                    const err = await res.json().catch(() => ({}));
                    toast(err.detail || 'Invalid credentials', 'error');
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            } catch (err) {
                toast(err.name === 'AbortError' ? 'Request timed out — try again' : 'Connection error. Is the server running?', 'error');
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // Fetch profile once at login and store role to localStorage
        // This means sales.html, stock-entry.html etc. can read role instantly
        async function fetchAndCacheRole(accessToken, username) {
            try {
                const res = await apiFetch(`${API_URL}/users/`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                }, 6000);
                if (!res.ok) return;
                const raw   = await res.json();
                const users = Array.isArray(raw) ? raw : (raw.results ?? []);
                const me    = users.find(u => u.username === username);
                if (me) {
                    const profile = me.profile || me.user_profile || {};
                    const role    = (profile.role || me.role || '').toLowerCase();
                    if (role) localStorage.setItem('role', role);
                }
            } catch { /* non-critical — pages will fall back to their own fetch */ }
        }

        // ── 7. Register modal ──
        const modal      = document.getElementById('registerModal');
        const registerBtn = document.getElementById('registerBtn');

        document.getElementById('registerLink').addEventListener('click', (e) => {
            e.preventDefault(); openModal();
        });
        document.getElementById('cancelBtn').addEventListener('click', closeModal);

        function openModal() {
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
            document.getElementById('regFirstName').focus();
        }
        function closeModal() {
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        // Close on backdrop click
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userData = {
                username:   document.getElementById('regUsername').value.trim(),
                email:      document.getElementById('regEmail').value.trim(),
                first_name: document.getElementById('regFirstName').value.trim(),
                last_name:  document.getElementById('regLastName').value.trim(),
                password:   document.getElementById('regPassword').value,
                profile: {
                    role:      document.getElementById('regRole').value,
                    shop_name: document.getElementById('regShopName').value.trim()
                }
            };

            registerBtn.classList.add('loading');
            registerBtn.disabled = true;

            try {
                const res = await apiFetch(`${API_URL}/users/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (res.ok) {
                    toast('Account created! Please login.', 'success');
                    closeModal();
                    usernameInput.value = userData.username;
                    passwordInput.focus();
                } else {
                    const err = await res.json().catch(() => ({}));
                    let msg = 'Registration failed';
                    if (err.username)      msg = 'Username already exists';
                    else if (err.email)    msg = 'Email already registered';
                    else if (err.password) msg = 'Password too weak (min 6 chars)';
                    toast(msg, 'error');
                }
            } catch {
                toast('Connection error', 'error');
            } finally {
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
            }
        });

    })();
    </script>
</body>
</html>
