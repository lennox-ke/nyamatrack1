<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#dc2626">
<title>Record Sale — NyamaTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="mobile-header">
  <div class="mobile-logo">
    <div class="mobile-logo-icon"><i class="fas fa-drumstick-bite"></i></div>
    NyamaTrack
  </div>
  <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()">
    <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
  </button>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="fas fa-drumstick-bite"></i></div>
        NyamaTrack
      </div>
    </div>
    <nav class="nav-menu"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-details"><h4 id="userName">User</h4><p id="userRole">Role</p></div>
      </div>
      <button onclick="logout()" class="btn btn-secondary" style="width:100%;justify-content:center;font-size:13px;">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Record Sale</h1>
      <p>Process customer transactions — FIFO (oldest stock sold first)</p>
    </div>

    <div class="card">
      <div class="card-body">

        <!-- Step 1 -->
        <div style="margin-bottom:24px;">
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:12px;display:flex;align-items:center;gap:8px;">
            <span style="background:var(--primary);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:10px;flex-shrink:0;">1</span>
            Select Meat Type
          </div>
          <div class="tiles-row" id="typeTiles">
            <span style="font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px;">
              <i class="fas fa-circle-notch fa-spin"></i> Loading…
            </span>
          </div>
        </div>

        <!-- Step 2 -->
        <div id="cutsSection" style="display:none;border-top:1px solid var(--border);padding-top:20px;">
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:12px;display:flex;align-items:center;gap:8px;">
            <span style="background:var(--primary);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:10px;flex-shrink:0;">2</span>
            Select a Cut
          </div>
          <div class="cuts-grid" id="cutsGrid"></div>
        </div>

        <!-- Step 3 -->
        <div id="salePanel" style="display:none;border-top:1px solid var(--border);padding-top:20px;margin-top:20px;">
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:16px;display:flex;align-items:center;gap:8px;">
            <span style="background:var(--primary);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:10px;flex-shrink:0;">3</span>
            Enter Sale Details
          </div>

          <div class="notice">
            <i class="fas fa-info-circle"></i>
            <div><strong>FIFO Active:</strong> This sale will deduct from the oldest batch first to minimise spoilage.</div>
          </div>

          <div class="info-box" id="selectedInfoBox"></div>

          <form id="saleForm">
            <input type="hidden" id="selectedStockId">
            <div class="form-grid" style="margin-bottom:0;">
              <div class="form-group">
                <label class="form-label">Weight to Sell (kg) *</label>
                <input type="number" step="0.01" class="form-input" id="weightSold" placeholder="0.00" required oninput="calculateTotal()">
              </div>
              <div class="form-group">
                <label class="form-label">Price per kg (KES)</label>
                <input type="number" step="0.01" class="form-input" id="pricePerKg" placeholder="0.00" oninput="calculateTotal()">
              </div>
              <div class="form-group">
                <label class="form-label">Total Amount (KES) *</label>
                <input type="number" step="0.01" class="form-input" id="totalPrice" placeholder="0.00" required
                       style="font-size:18px;font-weight:700;color:var(--primary);">
              </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
              <button type="submit" class="btn btn-primary" id="saleBtn" style="font-size:15px;padding:13px 28px;">
                <i class="fas fa-check-circle"></i> Complete Sale
              </button>
              <button type="button" class="btn btn-secondary" onclick="resetAll()">
                <i class="fas fa-undo"></i> Clear
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>
</div>

<nav class="mobile-nav"><div class="mobile-nav-inner"></div></nav>
<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('not authenticated');

buildSidebar('sales.html');
loadUserRole();

const typeIcons = { beef:'fa-cow', pork:'fa-piggy-bank', chicken:'fa-feather-alt', lamb:'fa-horse', goat:'fa-horse', fish:'fa-fish', default:'fa-drumstick-bite' };
function getTypeIcon(n) {
  const k = (n||'').toLowerCase();
  for (const [key,icon] of Object.entries(typeIcons)) if (k.includes(key)) return icon;
  return typeIcons.default;
}

let allStock=[], meatTypes=[], selectedTypeId=null, selectedStockItem=null;

async function loadData() {
  try {
    [meatTypes, allStock] = await Promise.all([
      apiRequest('/meat-types/'),
      apiRequest('/stock/')
    ]);
    renderTypeTiles();
    if (selectedTypeId) renderCuts(selectedTypeId);
  } catch (err) { Toast.error('Failed to load data'); }
}

function renderTypeTiles() {
  const c = document.getElementById('typeTiles');
  if (!meatTypes.length) { c.innerHTML='<span style="color:var(--text-muted);font-size:13px;">No meat types found</span>'; return; }
  c.innerHTML = meatTypes.map(t => `
    <div class="type-tile ${selectedTypeId==t.id?'active':''}" onclick="selectType(${t.id},this)">
      <i class="fas ${getTypeIcon(t.name)}"></i>${t.name}
    </div>`).join('');
}

function selectType(typeId, el) {
  selectedTypeId = typeId;
  document.querySelectorAll('.type-tile').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedStockItem = null;
  document.getElementById('salePanel').style.display = 'none';
  document.getElementById('saleForm').reset();
  renderCuts(typeId);
}

function renderCuts(typeId) {
  const section = document.getElementById('cutsSection');
  const grid    = document.getElementById('cutsGrid');
  const filtered = allStock.filter(i => String(i.meat_cut_details?.meat_type) === String(typeId));
  section.style.display = 'block';
  if (!filtered.length) {
    grid.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);grid-column:1/-1;"><i class="fas fa-box-open" style="font-size:28px;margin-bottom:10px;display:block;opacity:.5;"></i><p style="font-size:13px;">No stock for this meat type</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(item => {
    const entries = item.stock_entries || [];
    const oldest  = item.receive_date ? DateUtils.formatDate(item.receive_date) : '—';
    const badge   = item.is_spoilage_warning ? '<span class="badge badge-danger">Spoilage Risk</span>'
                  : item.is_low_stock        ? '<span class="badge badge-warning">Low Stock</span>'
                  :                            '<span class="badge badge-success">Good</span>';
    const sel = selectedStockItem?.id === item.id;
    return `
      <div class="cut-card ${sel?'selected':''}" id="cut-card-${item.id}" onclick="selectCut(${item.id})">
        <div class="cut-card-name">${item.meat_cut_details?.name||'Unknown'}</div>
        <div class="cut-card-weight">${item.current_weight} <span>kg total</span></div>
        <div class="cut-card-meta"><i class="fas fa-layer-group"></i> ${entries.length} batch${entries.length!==1?'es':''} · Oldest: ${oldest}</div>
        <div class="cut-card-meta" style="margin-top:4px;"><i class="fas fa-clock"></i> ${item.days_since_received} days since oldest</div>
        ${badge}
      </div>`;
  }).join('');
}

function selectCut(stockId) {
  const item = allStock.find(s => s.id === stockId);
  if (!item) return;
  selectedStockItem = item;
  document.querySelectorAll('.cut-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`cut-card-${stockId}`)?.classList.add('selected');
  document.getElementById('selectedStockId').value = stockId;

  const entries   = item.stock_entries || [];
  const batchRows = entries.map(e =>
    `<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.05);">
      <span>${DateUtils.formatDate(e.receive_date)}</span><strong>${e.current_weight} kg</strong>
    </div>`).join('');

  const box = document.getElementById('selectedInfoBox');
  box.className = 'info-box' + (item.is_spoilage_warning ? ' spoilage' : '');
  box.innerHTML = `
    <div class="info-grid">
      <div class="info-item"><span class="info-item-label">Cut</span><span class="info-item-value">${item.meat_cut_details?.name}</span></div>
      <div class="info-item"><span class="info-item-label">Total Available</span><span class="info-item-value">${item.current_weight} kg</span></div>
      <div class="info-item"><span class="info-item-label">Batches</span><span class="info-item-value">${entries.length}</span></div>
      <div class="info-item"><span class="info-item-label">Oldest Batch</span><span class="info-item-value">${item.days_since_received} days old</span></div>
    </div>
    ${batchRows ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,.08);">${batchRows}</div>` : ''}
    ${item.is_spoilage_warning ? `<div style="font-size:12px;font-weight:600;color:var(--danger);display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed #fca5a5;"><i class="fas fa-exclamation-triangle"></i> Oldest batch at spoilage risk — sell immediately!</div>` : ''}
  `;

  const panel = document.getElementById('salePanel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior:'smooth', block:'center' });
  setTimeout(() => document.getElementById('weightSold').focus(), 350);
  Toast.success(`${item.meat_cut_details?.name} selected — ${item.current_weight} kg available`);
}

function calculateTotal() {
  const w = parseFloat(document.getElementById('weightSold').value) || 0;
  const p = parseFloat(document.getElementById('pricePerKg').value)  || 0;
  document.getElementById('totalPrice').value = (w * p).toFixed(2);
}

function resetAll() {
  selectedStockItem = null;
  document.getElementById('saleForm').reset();
  document.getElementById('salePanel').style.display = 'none';
  document.querySelectorAll('.cut-card').forEach(c => c.classList.remove('selected'));
}

document.getElementById('saleForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const stockId    = parseInt(document.getElementById('selectedStockId').value);
  const weightSold = parseFloat(document.getElementById('weightSold').value);
  const totalPrice = parseFloat(document.getElementById('totalPrice').value);

  if (!selectedStockItem) { Toast.error('Please select a cut first'); return; }
  if (!weightSold || weightSold <= 0) { Toast.error('Please enter a valid weight'); return; }
  if (weightSold > selectedStockItem.current_weight) {
    Toast.error(`Only ${selectedStockItem.current_weight} kg available`); return;
  }

  const btn = document.getElementById('saleBtn');
  Loading.show(btn, 'Processing…');
  try {
    const result = await apiRequest('/sales/', {
      method: 'POST',
      body: JSON.stringify({ stock: stockId, weight_sold: weightSold, sale_price: totalPrice })
    });
    Toast.success('Sale recorded! (FIFO: oldest stock sold first)');
    resetAll();
    await loadData();
  } catch (err) { Toast.error(err.message || 'Failed to record sale'); }
  Loading.hide(btn);
});

loadData();
</script>
</body>
</html>
